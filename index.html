<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>🏓 하늘탁</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f7ff;color:#1e293b;font-size:14px;min-height:100vh;}
input,select,button{font-family:inherit;}
input,select{width:100%;background:#fff;border:1.5px solid #cbd5e1;border-radius:10px;color:#1e293b;padding:9px 11px;font-size:14px;}
input::placeholder{color:#94a3b8;}
select option{background:#fff;color:#1e293b;}

/* 레이아웃 */
#app{display:none;}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e0f2fe,#fef9c3,#fce7f3);}
.loginBox{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(14,165,233,.15);}

/* 로딩 */
#loadWrap{position:fixed;inset:0;background:linear-gradient(135deg,#e0f2fe,#fef9c3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
.spinner{width:40px;height:40px;border:4px solid #bfdbfe;border-top-color:#0ea5e9;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 헤더 */
#header{background:linear-gradient(90deg,#0ea5e9,#06b6d4,#10b981);padding:11px 15px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(14,165,233,.3);}
.hTitle{font-size:18px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2);}
.hSub{font-size:10px;color:rgba(255,255,255,.8);}
.hRight{margin-left:auto;display:flex;align-items:center;gap:7px;}
.authBadge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700;}
.ab-admin{background:rgba(255,255,255,.3);color:#fff;}
.ab-temp{background:rgba(255,255,255,.2);color:#fef9c3;}
.ab-member{background:rgba(255,255,255,.2);color:#fff;}

/* 탭 */
#tabBar{display:flex;background:#fff;border-bottom:2px solid #e0f2fe;position:sticky;top:53px;z-index:99;box-shadow:0 2px 8px rgba(14,165,233,.1);}
.tabBtn{flex:1;min-width:0;padding:7px 1px 5px;background:none;border:none;border-bottom:3px solid transparent;color:#94a3b8;cursor:pointer;font-size:8px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .15s;}
.tabBtn.on{color:#0ea5e9;border-bottom-color:#0ea5e9;font-weight:900;}
.tabIcon{font-size:15px;}

/* 본문 */
#page{padding:13px;max-width:640px;margin:0 auto;padding-bottom:50px;}

/* 카드 */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid #e0f2fe;box-shadow:0 2px 8px rgba(14,165,233,.07);}
.cardHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cardTitle{font-weight:800;font-size:14px;color:#0f172a;}
.cardSub{font-size:11px;color:#64748b;}

/* 버튼 */
.btn{padding:9px 15px;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bGreen{background:linear-gradient(135deg,#10b981,#059669);}
.bGray{background:#94a3b8;}
.bDark{background:#e2e8f0;color:#475569;}
.bRed{background:linear-gradient(135deg,#f43f5e,#e11d48);}
.bAmber{background:linear-gradient(135deg,#f59e0b,#d97706);}
.bBlue{background:linear-gradient(135deg,#0ea5e9,#0284c7);}
.bSm{padding:5px 10px;font-size:12px;} .bXs{padding:3px 7px;font-size:11px;}
.bBlock{width:100%;display:block;text-align:center;}

/* 배지 */
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.bdgGreen{background:#d1fae5;color:#059669;}
.bdgAmber{background:#fef9c3;color:#d97706;}
.bdgBlue{background:#dbeafe;color:#2563eb;}
.bdgRed{background:#fee2e2;color:#dc2626;}
.bdgSlate{background:#f1f5f9;color:#475569;}
.bdgPurple{background:#ede9fe;color:#7c3aed;}

/* 아바타 */
.avt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.avtM{background:#dbeafe;border:2px solid #60a5fa;color:#2563eb;}
.avtF{background:#fce7f3;border:2px solid #f472b6;color:#db2777;}

/* 폼 */
.fLabel{display:block;font-size:10px;color:#64748b;margin-bottom:4px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.fGroup{margin-bottom:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

/* 내부 탭 */
.iTabs{display:flex;background:#f0f9ff;border-radius:10px;padding:3px;gap:3px;margin-bottom:10px;border:1px solid #e0f2fe;}
.iTab{flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#64748b;}
.iTab.on{background:#0ea5e9;color:#fff;box-shadow:0 2px 6px rgba(14,165,233,.3);}

/* 체크 */
.chkBox{width:17px;height:17px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #cbd5e1;background:#fff;cursor:pointer;}
.chkBox.on{background:#10b981;border-color:#10b981;}

/* 점수 버튼 */
.pmBtn{width:30px;height:30px;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:18px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.scoreNum{width:30px;text-align:center;font-weight:900;font-size:18px;color:#0ea5e9;}

/* 칩 */
.chip{display:inline-block;padding:5px 11px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid #e2e8f0;margin:3px;}
.chipOn{background:#0ea5e9;color:#fff;border-color:#0ea5e9;}
.chipOff{background:#f8fafc;color:#94a3b8;}
.chipA{background:#dbeafe;color:#2563eb;border-color:#bfdbfe;}
.chipB{background:#fef9c3;color:#d97706;border-color:#fde68a;}

/* 스코어보드 */
.sbWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sbTable{border-collapse:collapse;font-size:11px;}
.sbTable th,.sbTable td{border:1px solid #e2e8f0;padding:5px 7px;text-align:center;white-space:nowrap;}
.sbTable th{background:#f0f9ff;color:#475569;font-weight:700;}
.sbTable .nameCol{text-align:left;background:#f0f9ff;font-weight:700;}
.sbTable .self{background:#f8fafc;color:#cbd5e1;}
.sbTable .won{color:#059669;font-weight:700;}
.sbTable .lost{color:#dc2626;}
.sbTable .tot{background:#e0f2fe;font-weight:800;color:#0ea5e9;}

/* 순위 행 */
.rankRow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;}
.rankRow:last-child{border-bottom:none;}

/* 통계 그리드 */
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.statBox{background:#fff;border-radius:12px;padding:12px;border:1.5px solid #e0f2fe;}

/* 출석 */
.attGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.attBox{background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid #e0f2fe;}
.attHead{padding:8px 12px;font-weight:700;font-size:12px;}
.attBody{padding:7px;}
.attItem{padding:7px 8px;border-radius:8px;display:flex;align-items:center;gap:6px;margin-bottom:2px;}

/* 뒤로가기 */
.backBtn{background:none;border:none;color:#0ea5e9;cursor:pointer;font-size:22px;padding:0;margin-right:6px;line-height:1;}

/* 토스트 */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#10b981,#0ea5e9);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(14,165,233,.4);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 기타 */
.divider{border:none;border-top:1.5px solid #f1f5f9;margin:10px 0;}
.empty{text-align:center;color:#94a3b8;padding:36px 0;font-size:13px;}
.errBox{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:10px;padding:10px;color:#dc2626;font-size:13px;margin-bottom:10px;}
.infoBox{background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:10px;padding:10px;color:#059669;font-size:12px;margin-bottom:10px;}
.warnBox{background:#fef9c3;border:1.5px solid #fde68a;border-radius:10px;padding:10px;color:#d97706;font-size:12px;margin-bottom:10px;}
.row{display:flex;align-items:center;gap:8px;}
.flex1{flex:1;}
.tagA{background:#dbeafe;color:#2563eb;font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;}
.tagB{background:#fef9c3;color:#d97706;font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadWrap">
  <div style="font-size:48px;animation:spin 1s linear infinite;display:inline-block">🏓</div>
  <div style="color:#0ea5e9;font-size:14px;font-weight:700;margin-top:8px">하늘탁 로딩 중...</div>
</div>

<!-- 로그인 -->
<div id="loginWrap" style="display:none">
  <div class="loginBox">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:44px">🏓</div>
      <div style="font-size:22px;font-weight:900;color:#10b981;margin-top:6px">하늘탁</div>
      <div style="font-size:11px;color:#475569;margin-top:3px">임은코오롱 하늘채 탁구동호회</div>
    </div>
    <div id="loginErr" class="errBox" style="display:none"></div>
    <div class="fGroup">
      <label class="fLabel">비밀번호</label>
      <input type="password" id="pwInput" placeholder="비밀번호 입력"/>
    </div>
    <button class="btn bGreen bBlock" onclick="doLogin()">접속하기</button>
    <div style="margin-top:12px;font-size:11px;color:#475569;text-align:center">회원·임시·관리자 비번 모두 사용 가능</div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div id="header">
    <div style="font-size:22px">🏓</div>
    <div>
      <div class="hTitle">하늘탁</div>
      <div class="hSub">임은코오롱 하늘채 탁구동호회</div>
    </div>
    <div class="hRight">
      <span id="authBadge" class="authBadge"></span>
      <button style="background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;" onclick="doLogout()">🔒</button>
    </div>
  </div>
  <div id="tabBar"></div>
  <div id="page"></div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// 설정
// ════════════════════════════════════════════════════════════
var DIVS = ['1부','2부','3부','4부','5부','6부','7부'];
var POSITIONS = ['일반회원','회장','부회장','감사','총무','진행이사','홍보이사'];

// GitHub 저장소 설정
var GH_USER  = 'dohyunkim76-code';
var GH_REPO  = 'hanultak';
var GH_FILE  = 'db.json';
var GH_TOKEN = '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';
var GH_API   = 'https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+GH_FILE;

// ════════════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════════════
function uid(){ return Math.random().toString(36).substr(2,9); }
function today(){
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function thisMonth(){ return today().substr(0,7); }
function isOddMonth(dateStr){
  var m = parseInt((dateStr||today()).substr(5,2));
  return m % 2 === 1;
}

function showToast(msg, isErr){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#ef4444' : '#10b981';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ════════════════════════════════════════════════════════════
// DB (GitHub 클라우드 저장소)
// ════════════════════════════════════════════════════════════
var DB = null;
var DB_SHA = null;
var saveTimer = null;
var isSaving = false;

function _ghHeaders(){
  return {
    'Authorization': 'token '+GH_TOKEN,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json'
  };
}

function _initDB(data){
  DB = data || {};
  if(!DB.auth)       DB.auth       = { memberPw:'hanultak2026', adminPw:'admin1004', tempPw:'', tempDate:'' };
  if(!DB.members)    DB.members    = [];
  if(!DB.attendance) DB.attendance = {};
  if(!DB.meetings)   DB.meetings   = [];
  if(!DB.posts)      DB.posts      = [];
  if(!DB.visits)     DB.visits     = [];
  if(!DB.settings)   DB.settings   = {};
}

function loadDB(){
  return fetch(GH_API+'?t='+Date.now(), { headers: _ghHeaders() })
  .then(function(r){
    if(r.status === 404){ DB_SHA = null; _initDB({}); return; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(res){
    if(!res) return;
    DB_SHA = res.sha;
    var json = decodeURIComponent(escape(atob(res.content.replace(/\n/g,''))));
    _initDB(JSON.parse(json));
  })
  .catch(function(err){
    console.warn('loadDB 오류:', err);
    _initDB({});
  });
}

function saveDB(immediate){
  clearTimeout(saveTimer);
  function doSave(){
    if(isSaving) return;
    isSaving = true;
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(DB, null, 2))));
    var body = { message: 'DB 업데이트 '+new Date().toLocaleString('ko-KR'), content: content };
    if(DB_SHA) body.sha = DB_SHA;
    fetch(GH_API, {
      method: 'PUT',
      headers: _ghHeaders(),
      body: JSON.stringify(body)
    })
    .then(function(r){
      isSaving = false;
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(res){
      if(res && res.content) DB_SHA = res.content.sha;
    })
    .catch(function(err){
      isSaving = false;
      showToast('⚠️ 저장 실패: '+err.message, true);
    });
  }
  if(immediate) doSave();
  else saveTimer = setTimeout(doSave, 1200);
}

function manualSave(onDone){
  DB.settings = DB.settings || {};
  DB.settings.lastBackupDate = today();
  DB.settings.lastBackupTime = new Date().toLocaleString('ko-KR');
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(DB, null, 2))));
  var body = { message: '수동 저장 '+new Date().toLocaleString('ko-KR'), content: content };
  if(DB_SHA) body.sha = DB_SHA;
  fetch(GH_API, {
    method: 'PUT',
    headers: _ghHeaders(),
    body: JSON.stringify(body)
  })
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(res){
    if(res && res.content) DB_SHA = res.content.sha;
    showToast('✅ GitHub 저장 완료!');
    if(onDone) onDone(true);
  })
  .catch(function(err){
    showToast('❌ 저장 실패: '+err.message, true);
    if(onDone) onDone(false);
  });
}

function reloadFromGithub(onDone){
  if(!confirm('GitHub에서 최신 데이터를 다시 불러옵니다.\n\n⚠️ 현재 화면 데이터가 교체됩니다. 계속하시겠습니까?')) return;
  loadDB().then(function(){
    render();
    showToast('✅ GitHub에서 불러오기 완료!');
    if(onDone) onDone(true);
  }).catch(function(err){
    showToast('❌ 불러오기 실패: '+err.message, true);
    if(onDone) onDone(false);
  });
}

function autoBackupIfNeeded(){ /* GitHub 방식에서는 saveDB가 곧 저장 */ }

// ════════════════════════════════════════════════════════════
// 인증
// ════════════════════════════════════════════════════════════
// 0=없음 1=회원 2=임시 3=관리자
var authLv = 0;
try { authLv = parseInt(sessionStorage.getItem('htAuth')||'0'); } catch(e){}

function setAuth(lv){
  authLv = lv;
  try { sessionStorage.setItem('htAuth', lv); } catch(e){}
  updateAuthBadge();
}
function canEdit(){ return authLv === 3; }
function canScore(meetDate){ return authLv === 3 || (authLv === 2 && meetDate === today()); }
function canView(){ return authLv >= 1; }

function updateAuthBadge(){
  var b = document.getElementById('authBadge');
  if(!b) return;
  if(authLv===3){ b.textContent='관리자'; b.className='authBadge ab-admin'; }
  else if(authLv===2){ b.textContent='임시입력'; b.className='authBadge ab-temp'; }
  else if(authLv===1){ b.textContent='회원'; b.className='authBadge ab-member'; }
  var st = document.querySelector('[data-tab="settings"]');
  if(st) st.style.display = authLv===3 ? 'flex' : 'none';
}

function doLogin(){
  var pw = document.getElementById('pwInput').value.trim();
  var a  = DB.auth;
  var lv = 0;
  if(pw === a.adminPw) lv = 3;
  else if(a.tempPw && pw === a.tempPw && a.tempDate === today()) lv = 2;
  else if(pw === a.memberPw) lv = 1;
  if(lv > 0){
    setAuth(lv);
    // 이름 세션 저장 (방문예약/게시판 작성자 표시용)
    if(lv===1||lv===2){
      var nm=prompt('이름을 입력해주세요 (게시판/방문예약에 표시됩니다)','');
      if(nm&&nm.trim()) sessionStorage.setItem('htName',nm.trim());
    } else {
      sessionStorage.setItem('htName','관리자');
    }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
    // 자동 백업 (관리자만, 오늘 아직 백업 안 됐으면)
    if(lv === 3) autoBackupIfNeeded();
  } else {
    var e = document.getElementById('loginErr');
    e.textContent = '비밀번호가 올바르지 않습니다.';
    e.style.display = 'block';
  }
}

function doLogout(){
  setAuth(0);
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
}

// ════════════════════════════════════════════════════════════
// 앱 상태
// ════════════════════════════════════════════════════════════
var S = {
  tab: 'dashboard',
  // 회원
  mSearch: '', mSort: 'division', mForm: false, mEditId: null,
  // 출석
  aDate: today(), aView: 'day', aMonth: thisMonth(),
  // 월례회
  mtView: 'list', mtId: null, mtTab: 'parts',
  // 부수
  divSet: false,
  // 게시판
  boardPostId: null,
  // 방문예약
  visitDate: today()
};

// ════════════════════════════════════════════════════════════
// 탭 설정
// ════════════════════════════════════════════════════════════
var TABS = [
  { id:'dashboard', icon:'🏓', label:'대시보드' },
  { id:'members',   icon:'🎽', label:'회원명부' },
  { id:'attendance',icon:'📋', label:'출석부' },
  { id:'meetings',  icon:'🥇', label:'월례회' },
  { id:'board',     icon:'📣', label:'게시판' },
  { id:'visit',     icon:'🏸', label:'방문예약' },
  { id:'org',       icon:'🎖️', label:'조직도' },
  { id:'division',  icon:'⚡', label:'부수관리' },
  { id:'settings',  icon:'🔧', label:'설정' }
];

function buildTabBar(){
  var bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  TABS.forEach(function(t){
    var b = document.createElement('button');

// ════════════════════════════════════════════════════════════
// HTML 빌더 헬퍼
// ════════════════════════════════════════════════════════════
function h(tag, attrs, inner){
  var e = document.createElement(tag);
  if(attrs){
    if(attrs.cls) e.className = attrs.cls;
    if(attrs.style) e.setAttribute('style', attrs.style);
    if(attrs.id) e.id = attrs.id;
    if(attrs.type) e.type = attrs.type;
    if(attrs.value !== undefined) e.value = attrs.value;
    if(attrs.placeholder) e.placeholder = attrs.placeholder;
    if(attrs.min !== undefined) e.min = attrs.min;
    if(attrs.checked) e.checked = attrs.checked;
    if(attrs.selected) e.selected = attrs.selected;
    if(attrs.disabled) e.disabled = attrs.disabled;
    if(attrs.onclick) e.onclick = attrs.onclick;
    if(attrs.onchange) e.onchange = attrs.onchange;
    if(attrs.oninput) e.oninput = attrs.oninput;
    if(attrs.onkeydown) e.onkeydown = attrs.onkeydown;
  }
  if(typeof inner === 'string') e.innerHTML = inner;
  else if(inner instanceof Node) e.appendChild(inner);
  return e;
}
function ap(p){ for(var i=1;i<arguments.length;i++) if(arguments[i]) p.appendChild(arguments[i]); return p; }
function div(cls, style){ var e=document.createElement('div'); if(cls)e.className=cls; if(style)e.setAttribute('style',style); return e; }
function span(cls){ var e=document.createElement('span'); if(cls)e.className=cls; return e; }
function frag(){ return document.createDocumentFragment(); }
function card(title, sub){
  var c = div('card');
  if(title){
    var head = div('cardHead');
    var t = div('cardTitle'); t.textContent = title; head.appendChild(t);
    if(sub){ var s=div('cardSub'); s.textContent=sub; head.appendChild(s); }
    c.appendChild(head);
  }
  return c;
}
function btn(cls, txt, fn){
  var b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.innerHTML = txt;
  if(fn) b.onclick = fn;
  return b;
}
function bxs(cls, txt, fn){ return btn(cls+' bXs', txt, fn); }
function bdg(cls, txt){ var s=span('bdg bdg'+cls); s.textContent=txt; return s; }
function avt(m){
  var d = div('avt '+(m.gender==='여'?'avtF':'avtM'));
  d.textContent = m.name.charAt(0);
  return d;
}
function typeBdg(type){
  if(type==='team') return bdg('Blue','단체전');
  if(type==='individual') return bdg('Green','개인전');
  return bdg('Slate','친선');
}
function infoBox(msg){ var d=div('infoBox'); d.textContent=msg; return d; }
function warnBox(msg){ var d=div('warnBox'); d.textContent=msg; return d; }
function errBox(msg){ var d=div('errBox'); d.textContent=msg; return d; }
function memberName(id){ var m=DB.members.find(function(x){return x.id===id;}); return m?m.name:'?'; }

// 대시보드
// ════════════════════════════════════════════════════════════
function pgDash(){
  var f = frag();
  var td = today(), tm = thisMonth();
  var att = DB.attendance[td] || {offline:[], online:[]};

  var monthDays = 0;
  Object.keys(DB.attendance).forEach(function(d){
    if(d.startsWith(tm)){
      var a = DB.attendance[d];
      if((a.offline||[]).length + (a.online||[]).length > 0) monthDays++;
    }
  });

  var dc = {}; DIVS.forEach(function(d){ dc[d]=0; });
  DB.members.forEach(function(m){ dc[m.division] = (dc[m.division]||0)+1; });

  var top5 = DB.members.slice().sort(function(a,b){ return b.cumulativePoints-a.cumulativePoints; }).slice(0,5);
  var upcoming = DB.meetings.filter(function(m){ return m.status==='scheduled'; }).sort(function(a,b){ return a.date.localeCompare(b.date); });

  // 통계
  var sg = div('statGrid');
  [['👥','전체 회원',DB.members.length+'명','#10b981','#10b98133'],
   ['📍','오늘 오프라인',(att.offline||[]).length+'명','#f59e0b','#f59e0b33'],
   ['💬','오늘 온라인(카톡)',(att.online||[]).length+'명','#3b82f6','#3b82f633'],
   ['📅','이번달 출석일수',monthDays+'일','#8b5cf6','#8b5cf633']
  ].forEach(function(item){
    var b = div('statBox','border:1px solid '+item[4]);
    b.innerHTML = '<div style="font-size:20px;margin-bottom:4px">'+item[0]+'</div>'
      +'<div style="font-size:18px;font-weight:900;color:'+item[3]+'">'+item[2]+'</div>'
      +'<div style="font-size:10px;color:#64748b;margin-top:2px">'+item[1]+'</div>';
    sg.appendChild(b);
  });
  f.appendChild(sg);

  // 부수별
  var dc2 = card('부수별 현황','');
  var divRow = div('','display:flex;gap:5px');
  DIVS.forEach(function(d){
    var b = div('','flex:1;background:#0a0f1a;border-radius:7px;padding:7px 4px;text-align:center');
    b.innerHTML = '<div style="font-size:16px;font-weight:900;color:#10b981">'+dc[d]+'</div>'
      +'<div style="font-size:10px;color:#64748b;margin-top:1px">'+d+'</div>';
    divRow.appendChild(b);
  });
  dc2.appendChild(divRow); f.appendChild(dc2);

  // TOP5
  var t5c = card('🏆 승점 TOP 5','');
  if(!top5.length){
    t5c.appendChild(div('empty')); t5c.lastChild.textContent='회원 데이터가 없습니다.';
  } else {
    top5.forEach(function(m,i){
      var row = div('rankRow');
      var rc=['#fbbf24','#94a3b8','#cd7c3a','#475569','#475569'];
      var rn=div('','width:20px;font-weight:900;font-size:12px;color:'+rc[i]); rn.textContent=i+1;
      var av=avt(m); av.style.cssText='width:30px;height:30px;font-size:12px;margin-right:8px;';
      var info=div('flex1'); info.innerHTML='<div style="font-weight:700;font-size:13px">'+m.name+'</div><div style="font-size:10px;color:#64748b">'+m.division+'</div>';
      var pts=div('','font-weight:800;color:#10b981;font-size:12px'); pts.textContent=m.cumulativePoints+'점';
      ap(row,rn,av,info,pts); t5c.appendChild(row);
    });
  }
  f.appendChild(t5c);

  // 이달 출석률 TOP5
  var attStats = {};
  DB.members.forEach(function(m){ attStats[m.id]=0; });
  var attDays = 0;
  Object.keys(DB.attendance).forEach(function(d){
    if(!d.startsWith(tm)) return;
    var a = DB.attendance[d];
    var hasPeople = (a.offline||[]).length+(a.online||[]).length > 0;
    if(hasPeople) attDays++;
    (a.offline||[]).forEach(function(id){ if(attStats[id]!==undefined) attStats[id]++; });
    (a.online||[]).forEach(function(id){ if(attStats[id]!==undefined) attStats[id]++; });
  });
  if(DB.members.length>0){
    var attTop = DB.members.slice().sort(function(a,b){ return (attStats[b.id]||0)-(attStats[a.id]||0); }).slice(0,5);
    var atc = card('✅ 이달 출석 TOP 5',''+tm);
    attTop.forEach(function(m,i){
      var row2=div('rankRow');
      var rc2=['#fbbf24','#94a3b8','#cd7c3a','#475569','#475569'];
      var rn2=div('','width:20px;font-weight:900;font-size:12px;color:'+rc2[i]); rn2.textContent=i+1;
      var av2=avt(m); av2.style.cssText='width:28px;height:28px;font-size:11px;margin-right:6px';
      var info2=div('flex1'); info2.innerHTML='<span style="font-weight:700">'+m.name+'</span> <span style="font-size:10px;color:#64748b">'+m.division+'</span>';
      var cnt2=div('','font-weight:800;color:#10b981;font-size:12px');
      var pct = attDays>0 ? Math.round((attStats[m.id]||0)/attDays*100) : 0;
      cnt2.textContent=(attStats[m.id]||0)+'회 ('+pct+'%)';
      ap(row2,rn2,av2,info2,cnt2); atc.appendChild(row2);
    });
    f.appendChild(atc);
  }

  // 다음 월례회
  if(upcoming.length){
    var uc = card('📋 다음 월례회','');
    var row = div('row');
    var info = div('flex1'); info.innerHTML='<div style="font-weight:700">'+upcoming[0].title+'</div><div style="font-size:11px;color:#64748b">'+upcoming[0].date+'</div>';
    var bdgs = div('row');
    ap(bdgs, typeBdg(upcoming[0].type), bdg('Amber','예정'));
    ap(row, info, bdgs); uc.appendChild(row); f.appendChild(uc);
  }
  return f;
}

  // 추가/수정 폼
  if(S.mForm && canEdit()){
    var em = S.mEditId ? DB.members.find(function(m){return m.id===S.mEditId;}) : null;
    var fd = {
      name: em?em.name:'',
      gender: em?em.gender:'남',
      division: em?em.division:'4부',
      position: em?(em.position||'일반회원'):'일반회원',

    var gs = document.createElement('select');

      var o=document.createElement('option'); o.value=v; o.textContent=v;
      if(v===fd.gender) o.selected=true; gs.appendChild(o);
    });
    gs.onchange = function(e){ fd.gender=e.target.value; };
    var gg = div('fGroup'); ap(gg, h('label',{cls:'fLabel'},'성별'), gs);

    var ds = document.createElement('select');
    DIVS.forEach(function(v){
      var o=document.createElement('option'); o.value=v; o.textContent=v;
      if(v===fd.division) o.selected=true; ds.appendChild(o);
    });
    ds.onchange = function(e){ fd.division=e.target.value; };
    var dg = div('fGroup'); ap(dg, h('label',{cls:'fLabel'},'부수'), ds);

    var pi = h('input',{type:'number', min:'0', value:fd.cumulativePoints, oninput:function(e){fd.cumulativePoints=Number(e.target.value);}});
    var pg2 = div('fGroup'); ap(pg2, h('label',{cls:'fLabel'},'누적 승점'), pi);

          return m;

        DB.members.push({id:uid(), name:fd.name, gender:fd.gender, division:fd.division, position:fd.position||'일반회원', cumulativePoints:Number(fd.cumulativePoints)});
      }

    info.innerHTML='<div style="font-weight:700;color:#0f172a">'+m.name+posTag+' <span style="font-size:10px;color:#94a3b8">'+m.gender+'</span></div>'
      +'<div style="font-size:11px;color:#64748b;margin-top:1px">누적 '+m.cumulativePoints+'점</div>';
    var dv = div('','font-weight:900;color:#0ea5e9;font-size:14px;margin-right:8px'); dv.textContent=m.division;
    ap(item, avt(m), info, dv);

      var cid = m.id;
      var db = btn('bDark bXs','삭제', function(){
        if(confirm(memberName(cid)+' 회원을 삭제하시겠습니까?')){
          DB.members = DB.members.filter(function(x){return x.id!==cid;});
          saveDB(); render(); showToast('삭제되었습니다.');
        }
      });
      db.style.color='#ef4444';
      ap(btns, eb, db); item.appendChild(btns);
    }
    f.appendChild(item);
  });
  return f;
}

      if(mt.teamA.length<1||teamB.length<1){ showToast('A팀과 B팀 모두 1명 이상 필요합니다.',true); return; }
      mt.matches = genTeamMatches(mt.participants, mt.teamA);
      saveDB(); S.mtTab='matches'; render();
    });
    nb.style.marginTop='12px'; c.appendChild(nb);

function genTeamMatches(participants, teamA){
  var teamB = participants.filter(function(id){ return teamA.indexOf(id)<0; });
  var n = participants.length;
  var dblCount = n>=12?2:1;
  var matches = [];
  for(var i=0;i<dblCount;i++){
    matches.push({id:uid(),matchType:'doubles',aPlayers:teamA.slice(i*2,i*2+2),bPlayers:teamB.slice(i*2,i*2+2),setsA:0,setsB:0,played:false});
  }
  var aRem = teamA.slice(dblCount*2), bRem = teamB.slice(dblCount*2);
  var singles = Math.min(aRem.length, bRem.length);
  for(var j=0;j<singles;j++){
    matches.push({id:uid(),matchType:'singles',aPlayers:[aRem[j]],bPlayers:[bRem[j]],setsA:0,setsB:0,played:false});
  }
  return matches;
}

// ── 스코어보드 탭 ──────────────────────────────────────────
function tabScoreboard(mt){
  var f = frag();
  var parts = mt.participants;
  var names = parts.map(memberName);
  var setsFor={}, h2h={};
  parts.forEach(function(id){ setsFor[id]=0; h2h[id]={}; });
  (mt.rrMatches||[]).forEach(function(m){
    if(!m.played) return;
    setsFor[m.p1]=(setsFor[m.p1]||0)+m.sets1;
    setsFor[m.p2]=(setsFor[m.p2]||0)+m.sets2;
    h2h[m.p1][m.p2]={w:m.sets1,l:m.sets2};
    h2h[m.p2][m.p1]={w:m.sets2,l:m.sets1};
  });
  var ranked = calcRankings(parts, setsFor, h2h);
  mt.rankings = ranked;

  var c = card('스코어보드','');
  var wrap = div('sbWrap');
  var tbl = document.createElement('table'); tbl.className='sbTable';
  var thead = document.createElement('thead');
  var hr2 = document.createElement('tr');
  var th0=document.createElement('th'); th0.textContent=''; hr2.appendChild(th0);
  parts.forEach(function(_,i){ var th=document.createElement('th'); th.textContent=i+1; hr2.appendChild(th); });
  var thT=document.createElement('th'); thT.textContent='총'; hr2.appendChild(thT);
  thead.appendChild(hr2); tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  parts.forEach(function(pid, i){
    var ri = ranked.findIndex(function(r){return r.memberId===pid;});
    var rnk = ri>=0?ranked[ri].rank:'-';
    var tr2 = document.createElement('tr');
    var nameTd=document.createElement('td'); nameTd.className='nameCol'; nameTd.textContent=rnk+'. '+names[i];
    tr2.appendChild(nameTd);
    parts.forEach(function(pid2,j){
      var td=document.createElement('td');
      if(i===j){ td.className='self'; td.textContent='－'; }
      else {
        var r=(h2h[pid]||{})[pid2];
        if(!r){ td.textContent=''; }
        else { td.className=r.w>r.l?'won':'lost'; td.textContent=r.w; }
      }
      tr2.appendChild(td);
    });
    var totTd=document.createElement('td'); totTd.className='tot'; totTd.textContent=setsFor[pid]||0;
    tr2.appendChild(totTd);
    tbody.appendChild(tr2);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl); c.appendChild(wrap); f.appendChild(c);

  var rc = card('순위','');
  ranked.forEach(function(r,i){
    var mem = DB.members.find(function(m){return m.id===r.memberId;});
    var row = div('rankRow');
    var rc2=['#fbbf24','#94a3b8','#cd7c3a'];
    var rn=div('','width:20px;font-weight:900;font-size:12px;color:'+(rc2[i]||'#475569')); rn.textContent=r.rank;
    var info=div('flex1'); info.innerHTML='<span style="font-weight:700">'+(mem?mem.name:'?')+'</span>';
    var pts=div('','color:#10b981;font-weight:700;font-size:12px'); pts.textContent=(setsFor[r.memberId]||0)+'세트';
    ap(row,rn,info,pts); rc.appendChild(row);
  });
  f.appendChild(rc);
  return f;
}

function calcRankings(parts, setsFor, h2h){
  var sorted = parts.slice().sort(function(a,b){
    var diff=(setsFor[b]||0)-(setsFor[a]||0);
    if(diff!==0) return diff;
    var r=(h2h[a]||{})[b];
    if(r) return r.w>r.l?-1:1;
    return 0;
  });
  return sorted.map(function(pid,i){ return {memberId:pid, rank:i+1, totalSets:setsFor[pid]||0}; });
}

function genRR(participants){
  var matches=[];
  for(var i=0;i<participants.length;i++)
    for(var j=i+1;j<participants.length;j++)
      matches.push({id:uid(),p1:participants[i],p2:participants[j],sets1:null,sets2:null,played:false});
  return matches;
}

      sf[m.p1]=(sf[m.p1]||0)+m.sets1; sf[m.p2]=(sf[m.p2]||0)+m.sets2;

      }
    }

    ranked2.forEach(function(r){
      var mem=DB.members.find(function(m){return m.id===r.memberId;}); if(!mem) return;

// 방문 예약
// ════════════════════════════════════════════════════════════
var VISIT_SLOTS = [
  '06:00','06:30','07:00','07:30','08:00','08:30','09:00','09:30',
  '10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30',
  '14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30',
  '18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30',
  '22:00','22:30','23:00','23:30','24:00'
];

function pgVisit(){
  var f=frag();

  var ht=div('row','margin-bottom:6px');
  ht.innerHTML='<div style="font-weight:800;font-size:15px;color:#0f172a">🏸 탁구장 방문 현황</div>';
  f.appendChild(ht);

  var guide=div('infoBox'); guide.innerHTML='🏓 내 방문 시간을 등록하면, 다른 회원이 보고 같이 갈 수 있어요!'; f.appendChild(guide);

  var selDate=S.visitDate||today();
  var WD=['일','월','화','수','목','금','토'];

  // 날짜 탭
  var dateRow=div('','display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px');
  for(var di=0;di<7;di++){
    (function(di2){
      var dd=new Date(); dd.setDate(dd.getDate()+di2);
      var ds=dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate());
      var isSel=ds===selDate, isTd=di2===0;
      var db2=document.createElement('button');
      db2.style.cssText='flex-shrink:0;width:52px;padding:7px 4px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;text-align:center;font-weight:700;transition:all .15s;'
        +(isSel?'background:linear-gradient(135deg,#0ea5e9,#10b981);color:#fff;box-shadow:0 3px 10px rgba(14,165,233,.4);':'background:#f0f9ff;color:#475569;border:1.5px solid #bae6fd;');
      db2.innerHTML='<div style="font-size:16px;font-weight:900">'+dd.getDate()+'</div>'
        +'<div style="font-size:10px;margin-top:1px">'+(isTd?'오늘':WD[dd.getDay()])+'</div>';
      db2.onclick=function(){S.visitDate=ds;render();};
      dateRow.appendChild(db2);
    })(di);
  }
  f.appendChild(dateRow);

  var dayVisits=(DB.visits||[]).filter(function(v){return v.date===selDate;});

  // 슬롯맵
  var slotMap={};
  VISIT_SLOTS.forEach(function(s){slotMap[s]=[];});
  dayVisits.forEach(function(v){
    var si=VISIT_SLOTS.indexOf(v.startSlot||v.timeSlot);
    var ei=VISIT_SLOTS.indexOf(v.endSlot||v.timeSlot);
    if(si<0) return;
    if(ei<=si) ei=si+2;
    for(var i=si;i<ei&&i<VISIT_SLOTS.length;i++) slotMap[VISIT_SLOTS[i]].push(v);
  });

  // ── 내 방문 등록 카드 ─────────────────────────────────────
  var regCard=card('📍 방문 등록','시간을 선택하고 이름을 입력하세요');

  // 이름 입력 (세션 없을 때)
  var myName=sessionStorage.getItem('htName')||'';
  var myVisit=myName?dayVisits.find(function(v){return v.memberName===myName;}):null;

  if(myVisit){
    var ci=div('','background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:10px;padding:12px 14px;margin-bottom:8px;');
    ci.innerHTML='✅ <strong style="color:#065f46">'+(myVisit.startSlot||myVisit.timeSlot)+' ~ '+(myVisit.endSlot||myVisit.timeSlot)+'</strong> 로 등록됨';
    regCard.appendChild(ci);
    regCard.appendChild(btn('bRed bSm','예약 취소',function(){
      DB.visits=DB.visits.filter(function(v){return v.id!==myVisit.id;});
      saveDB(); render(); showToast('예약이 취소되었습니다.');
    }));
  } else {
    // 시작/종료 드롭다운
    var selRow=div('row','gap:8px;margin-bottom:8px');
    var startSel=document.createElement('select');
    startSel.style.cssText='flex:1;background:#fff;border:1.5px solid #bae6fd;border-radius:10px;color:#0f172a;padding:9px 11px;font-size:14px;font-family:inherit;';
    VISIT_SLOTS.slice(0,-1).forEach(function(s){
      var o=document.createElement('option'); o.value=s; o.textContent=s;
      if(s==='09:00') o.selected=true; startSel.appendChild(o);
    });
    var arrow=div('','flex-shrink:0;font-weight:700;color:#0ea5e9;font-size:16px'); arrow.textContent='→';
    var endSel=document.createElement('select');
    endSel.style.cssText='flex:1;background:#fff;border:1.5px solid #bae6fd;border-radius:10px;color:#0f172a;padding:9px 11px;font-size:14px;font-family:inherit;';
    VISIT_SLOTS.slice(1).forEach(function(s){
      var o=document.createElement('option'); o.value=s; o.textContent=s;
      if(s==='11:00') o.selected=true; endSel.appendChild(o);
    });
    ap(selRow,startSel,arrow,endSel);
    regCard.appendChild(selRow);

    // 이름 입력
    var nameIn=h('input',{placeholder:'이름 입력 (예: 홍길동)',value:myName});
    nameIn.style.marginBottom='8px';
    regCard.appendChild(nameIn);

    regCard.appendChild(btn('bGreen bBlock','🏸 방문 등록',function(){
      var ss=startSel.value, ee=endSel.value;
      if(VISIT_SLOTS.indexOf(ee)<=VISIT_SLOTS.indexOf(ss)){showToast('종료 시간이 시작보다 늦어야 합니다.',true);return;}
      var nm=nameIn.value.trim();
      if(!nm){showToast('이름을 입력하세요.',true);return;}
      sessionStorage.setItem('htName',nm);
      DB.visits=DB.visits||[];
      DB.visits.push({id:uid(),date:selDate,startSlot:ss,endSlot:ee,timeSlot:ss,memberName:nm,note:'',createdAt:new Date().toISOString()});
      saveDB(); render(); showToast(nm+' '+ss+'~'+ee+' 등록! 🏓');
    }));
  }
  f.appendChild(regCard);

  // ── 시간표 그리드 ─────────────────────────────────────────
  var gc=card('📅 '+selDate+' 탁구장 현황','');

  if(!dayVisits.length){
    var noV=div('','text-align:center;padding:28px 0;color:#94a3b8;font-size:13px');
    noV.innerHTML='😴 아직 방문 등록한 회원이 없어요<br><span style="font-size:12px;color:#cbd5e1">위에서 먼저 등록해보세요!</span>';
    gc.appendChild(noV); f.appendChild(gc); return f;
  }

  var maxCnt=1;
  VISIT_SLOTS.forEach(function(s){if(slotMap[s].length>maxCnt)maxCnt=slotMap[s].length;});

  // 방문자 있는 범위만 표시 (+앞뒤 여유 2칸)
  var firstIdx=VISIT_SLOTS.length, lastIdx=0;
  VISIT_SLOTS.forEach(function(s,i){if(slotMap[s].length>0){if(i<firstIdx)firstIdx=i;if(i>lastIdx)lastIdx=i;}});
  firstIdx=Math.max(0,firstIdx-2);
  lastIdx=Math.min(VISIT_SLOTS.length-1,lastIdx+2);

  for(var idx=firstIdx;idx<=lastIdx;idx++){
    var slot=VISIT_SLOTS[idx];
    var visitors=slotMap[slot];
    var cnt=visitors.length;
    var isHour=slot.endsWith(':00');

    // 정시마다 구분선
    if(isHour&&idx>firstIdx){
      var hr=div('','border-top:1px dashed #e0f2fe;margin:3px 0'); gc.appendChild(hr);
    }

    var row=div('','display:flex;align-items:center;gap:6px;margin-bottom:2px');

    // 시간 레이블
    var tl=div('','flex-shrink:0;width:46px;font-size:'+(isHour?'11px':'10px')+';font-weight:'+(isHour?'700':'400')+';color:'+(isHour?'#334155':'#94a3b8')+'');
    tl.textContent=isHour?slot:'';
    row.appendChild(tl);

    // 슬롯 바
    var barWr=div('','flex:1;height:30px;border-radius:8px;display:flex;align-items:center;padding:0 8px;overflow:hidden;position:relative;');

    if(cnt===0){
      barWr.style.background='#f8fafc';
      barWr.style.border='1px solid #f1f5f9';
    } else {
      var alpha=Math.min(0.18+cnt/maxCnt*0.65,0.82);
      barWr.style.background='rgba(14,165,233,'+alpha+')';
      barWr.style.border='1px solid rgba(14,165,233,'+(Math.min(alpha+0.15,1))+')';

      // 이름 칩들 (최대 4명 표시)
      var shown=visitors.slice(0,4);
      shown.forEach(function(v){
        var isMe=(v.memberName===myName);
        var chip=div('','flex-shrink:0;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-right:4px;white-space:nowrap;'
          +(isMe?'background:#059669;color:#fff;':'background:rgba(255,255,255,.88);color:#0369a1;'));
        chip.textContent=(isMe?'✓ ':'')+v.memberName;
        barWr.appendChild(chip);
      });
      if(visitors.length>4){
        var more=div('','flex-shrink:0;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.2);padding:2px 6px;border-radius:8px');
        more.textContent='+' +(visitors.length-4)+'명'; barWr.appendChild(more);
      }

      // 우측 인원 배지
      var cBdg=div('','position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:#0369a1;background:rgba(255,255,255,.7);padding:1px 6px;border-radius:8px;pointer-events:none');
      cBdg.textContent=cnt+'명'; barWr.appendChild(cBdg);
    }
    row.appendChild(barWr);
    gc.appendChild(row);
  }
  f.appendChild(gc);

  // ── 방문자 목록 ──────────────────────────────────────────
  var listCard=card('🏓 오늘 방문 예정 '+dayVisits.length+'명','');
  dayVisits.forEach(function(v){
    var isMe=(v.memberName===myName);
    var vrow=div('row','padding:9px 0;border-bottom:1.5px solid #f0f9ff');
    var avEl=div('','width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;'
      +(isMe?'background:#d1fae5;border:2px solid #34d399;color:#059669':'background:#dbeafe;border:2px solid #60a5fa;color:#2563eb'));
    avEl.textContent=v.memberName.charAt(0);
    var info=div('flex1');
    var dur='';
    var si3=VISIT_SLOTS.indexOf(v.startSlot||v.timeSlot);
    var ei3=VISIT_SLOTS.indexOf(v.endSlot||v.timeSlot);
    if(si3>=0&&ei3>si3) dur=' ('+((ei3-si3)*30)+'분)';
    info.innerHTML='<div style="font-weight:700;color:#0f172a">'+(isMe?'<span style="color:#059669">✓ </span>':'')+v.memberName+'</div>'
      +'<div style="font-size:11px;color:#0ea5e9;margin-top:1px">'+(v.startSlot||v.timeSlot)+' ~ '+(v.endSlot||v.timeSlot)+dur+'</div>';
    ap(vrow,avEl,info);
    if(isMe||canEdit()){
      (function(vid){
        var delB=btn('bRed bXs','취소',function(){
          DB.visits=DB.visits.filter(function(x){return x.id!==vid;});
          saveDB();render();
        });
        vrow.appendChild(delB);
      })(v.id);
    }
    listCard.appendChild(vrow);
  });
  f.appendChild(listCard);
  return f;
}

    DB.auth.tempPw=newTemp;
    DB.auth.tempDate=newTemp?today():'';
    saveDB(true); showToast('비밀번호가 저장되었습니다.');
  }));
  f.appendChild(pc);

  // 데이터 초기화
  var rc=card('⚠️ 데이터 관리','');
  rc.appendChild(div('warnBox').appendChild(document.createTextNode('아래 초기화는 되돌릴 수 없습니다.')) || div('warnBox'));
  var wb=div('warnBox'); wb.textContent='⚠️ 초기화 후 복구 불가능합니다. 신중하게 사용하세요.'; rc.appendChild(wb);
  var bg=div('','display:flex;gap:8px;flex-wrap:wrap');
  [['출석부 초기화','bAmber bSm',function(){
    if(!confirm('출석 데이터를 모두 삭제할까요?')) return;
    DB.attendance={}; saveDB(true); render(); showToast('출석부가 초기화되었습니다.');
  }],
  ['월례회 초기화','bRed bSm',function(){
    if(!confirm('월례회 데이터를 모두 삭제할까요?')) return;
    DB.meetings=[]; saveDB(true); render(); showToast('월례회가 초기화되었습니다.');
  }],
  ['게시판 초기화','bRed bSm',function(){
    if(!confirm('게시글을 모두 삭제할까요?')) return;
    DB.posts=[]; saveDB(true); render(); showToast('게시판이 초기화되었습니다.');
  }],
  ['방문예약 초기화','bAmber bSm',function(){
    if(!confirm('방문예약 데이터를 모두 삭제할까요?')) return;
    DB.visits=[]; saveDB(true); render(); showToast('방문예약이 초기화되었습니다.');
  }],
  ['전체 초기화','bRed bSm',function(){
    if(!confirm('모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
    DB.members=[]; DB.attendance={}; DB.meetings=[]; DB.posts=[]; DB.visits=[];
    saveDB(true); render(); showToast('전체 초기화 완료.');
  }]].forEach(function(item){
    bg.appendChild(btn(item[1],item[0],item[2]));
  });
  rc.appendChild(bg); f.appendChild(rc);

  // 앱 정보
  var ic=card('🏓 앱 정보','');
  ic.innerHTML='<div style="font-size:13px;color:#475569;line-height:2">'
    +'<div>📛 하늘탁 - 임은코오롱 하늘채 탁구동호회</div>'
    +'<div>🗓️ 버전: 2.2 (2026.03)</div>'
    +'<div>💾 저장: GitHub (db.json)</div>'
    +'<div>🚀 배포: Netlify</div>'
    +'</div>';
  f.appendChild(ic);
  return f;
}

// ── 앱 초기화 ────────────────────────────────────────────────
window.onload = function(){
  var loadWrap  = document.getElementById('loadWrap');
  var loginWrap = document.getElementById('loginWrap');

  loadDB()
  .then(function(){
    loadWrap.style.display = 'none';
    loginWrap.style.display = 'flex';
  })
  .catch(function(){
    loadWrap.style.display = 'none';
    loginWrap.style.display = 'flex';
  });
};
</script>
